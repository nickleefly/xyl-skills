<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font: 13px/1.5 system-ui, -apple-system, sans-serif;
      padding: 16px;
      background: #15202b;
      color: #e7e9ea;
    }
    h1 { font-size: 16px; margin-bottom: 12px; color: #1d9bf0; }
    .card {
      background: #1e2d3d;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 600;
      color: #8899a6;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .status { font-size: 13px; margin-bottom: 8px; }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .status-dot.ok { background: #00ba7c; }
    .status-dot.warn { background: #ffad1f; }
    .status-dot.err { background: #f4212e; }
    button {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font: 600 13px/1 system-ui;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: default; }
    .btn-primary { background: #1d9bf0; color: white; }
    .btn-stop { background: #f4212e; color: white; margin-top: 6px; }
    .hint { font-size: 11px; color: #8899a6; margin-top: 6px; }
    #result { font-size: 12px; margin-top: 8px; color: #00ba7c; }
    #error { font-size: 12px; margin-top: 8px; color: #f4212e; }
    label { font-size: 12px; display: block; margin-bottom: 4px; }
    input[type="number"] {
      width: 100%; padding: 6px 8px; border-radius: 4px;
      border: 1px solid #38444d; background: #192734; color: #e7e9ea;
      font: 13px/1 system-ui;
    }
  </style>
</head>
<body>
  <h1>X Fetcher</h1>

  <div class="card">
    <div class="card-title">Page Status</div>
    <div class="status">
      <span class="status-dot" id="pageDot"></span>
      <span id="pageInfo">Checking...</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Fetch Tweets</div>
    <label for="maxRounds">Max scroll rounds</label>
    <input type="number" id="maxRounds" value="20" min="1" max="100">
    <button class="btn-primary" id="fetchBtn" style="margin-top:8px">Fetch from this page</button>
    <button class="btn-stop" id="stopBtn" style="display:none">Stop</button>
    <p class="hint">Navigate to x.com/i/bookmarks or your likes page first.</p>
  </div>

  <div class="card" id="downloadCard" style="display:none">
    <div class="card-title">Download</div>
    <div id="downloadInfo" style="font-size:13px;margin-bottom:8px"></div>
    <button class="btn-primary" id="downloadBtn" style="background:#00ba7c">Download Markdown</button>
    <button class="btn-primary" id="downloadJsonBtn" style="background:#1d9bf0;margin-top:6px">Download JSON</button>
  </div>

  <div id="result"></div>
  <div id="error"></div>

  <script src="popup.js"></script>
</body>
</html>
